name: Cleanup Preview

on:
  pull_request:
    types: [closed]
  delete:
defaults:
  run:
    shell: bash
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  cleanup:
    name: Delete Amplify branch (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: dev
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
    permissions:
      id-token: write

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          audience: sts.amazonaws.com
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
          role-session-name: ${{ env.ROLE_SESSION_NAME }}
        env:
          ROLE_SESSION_NAME: gh-oidc-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Delete branch from Amplify
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          echo "Deleting $BRANCH from staging"
          aws amplify delete-branch \
            --app-id ${{ secrets.AMPLIFY_APP_ID_STG }} \
            --branch-name "$BRANCH" \
          2>/dev/null || echo "Branch not found in staging, skipping."
