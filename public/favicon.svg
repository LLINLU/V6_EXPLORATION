
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#grad)" />
  
  <!-- Memory AI icon - simplified brain/circuit design -->
  <g fill="white">
    <!-- Brain outline -->
    <path d="M35 30 Q25 25 20 35 Q20 45 25 50 Q20 55 25 65 Q35 70 50 65 Q65 70 75 65 Q80 55 75 50 Q80 45 75 35 Q65 25 50 30 Q42 25 35 30 Z" stroke="white" stroke-width="2" fill="none" />
    
    <!-- Circuit nodes -->
    <circle cx="35" cy="40" r="2" />
    <circle cx="50" cy="35" r="2" />
    <circle cx="65" cy="40" r="2" />
    <circle cx="40" cy="50" r="2" />
    <circle cx="60" cy="50" r="2" />
    <circle cx="45" cy="60" r="2" />
    <circle cx="55" cy="60" r="2" />
    
    <!-- Circuit connections -->
    <line x1="35" y1="40" x2="50" y2="35" stroke="white" stroke-width="1" />
    <line x1="50" y1="35" x2="65" y2="40" stroke="white" stroke-width="1" />
    <line x1="35" y1="40" x2="40" y2="50" stroke="white" stroke-width="1" />
    <line x1="65" y1="40" x2="60" y2="50" stroke="white" stroke-width="1" />
    <line x1="40" y1="50" x2="45" y2="60" stroke="white" stroke-width="1" />
    <line x1="60" y1="50" x2="55" y2="60" stroke="white" stroke-width="1" />
    <line x1="45" y1="60" x2="55" y2="60" stroke="white" stroke-width="1" />
  </g>
</svg>
